      ];

      // ── STATE ─────────────────────────────────────────────────────────────────────
      let activeCategory = "all";
      let searchQuery = "";

      // ── RENDER ────────────────────────────────────────────────────────────────────
      function renderCategories() {
        const tabs = document.getElementById("categoryTabs");
        tabs.innerHTML = categories
          .map(
            (cat) => `
    <button class="cat-btn ${activeCategory === cat.id ? "active" : ""}" data-id="${cat.id}">
      ${cat.icon} ${cat.label}
    </button>
  `,
          )
          .join("");

        tabs.querySelectorAll(".cat-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            activeCategory = btn.dataset.id;
            renderCategories();
            renderGuides();
          });
        });
      }

      function matchesSearch(guide, query) {
        if (!query) return true;
        const q = query.toLowerCase();
        return (
          guide.title.toLowerCase().includes(q) ||
          guide.description.toLowerCase().includes(q) ||
          guide.categoryLabel.toLowerCase().includes(q) ||
          guide.tags.some((t) => t.toLowerCase().includes(q))
        );
      }

      function renderGuides() {
        const grid = document.getElementById("guidesGrid");
        const title = document.getElementById("sectionTitle");
        const count = document.getElementById("guidesCount");

        const filtered = guides.filter((g) => {
          const catMatch = activeCategory === "all" || g.category === activeCategory;
          const searchMatch = matchesSearch(g, searchQuery);
          return catMatch && searchMatch;
        });

        const catLabel =
          activeCategory === "all" ? "All Guides" : categories.find((c) => c.id === activeCategory)?.label + " Guides";
        title.textContent = searchQuery ? `Results for "${searchQuery}"` : catLabel;
        count.textContent = `${filtered.length} guide${filtered.length !== 1 ? "s" : ""}`;

        if (filtered.length === 0) {
          grid.innerHTML = `
      <div class="empty-state">
        <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="margin:0 auto;color:var(--gray-300)"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <p>No guides found. Try a different search or category.</p>
      </div>`;
          return;
        }

        grid.innerHTML = filtered
          .map(
            (g) => `
    <article class="card" role="button" tabindex="0" aria-label="${g.title}">
      <div class="card-image-wrap">
        <div class="card-image bg-${g.category}">${g.emoji}</div>
        ${g.popular ? `<span class="badge">&#x1f525; Most popular</span>` : ""}
      </div>
      <div class="card-body">
        <span class="card-category color-${g.category}">${g.categoryLabel.toUpperCase()}</span>
        <h3 class="card-title">${g.title}</h3>
        <p class="card-desc">${g.description}</p>
        <div class="card-tags">
          ${g.tags.map((t) => `<span class="tag">${t}</span>`).join("")}
        </div>
      </div>
      <div class="card-footer">
        <span class="read-time">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${g.readTime} min read
        </span>
        <a class="read-link" href="${g.href}">
          Read Guide
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M4.5 12L19.5 12M13.875 18L19.5 12L13.875 6" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
      </div>
    </article>
  `,
          )
          .join("");
      }

      // // ── SEARCH ────────────────────────────────────────────────────────────────────
      // document.getElementById("searchInput").addEventListener("input", e => {
      //   searchQuery = e.target.value.trim();
      //   if (searchQuery) activeCategory = "all";
      //   renderCategories();
      //   renderGuides();
      // });

      // // ── INIT ──────────────────────────────────────────────────────────────────────
      // renderCategories();
      // renderGuides();

      // ── SEARCH ────────────────────────────────────────────────────────────────────
      const searchInput = document.getElementById("searchInput");
      const searchDropdown = document.getElementById("searchDropdown");

      function renderDropdown(query) {
        if (!query) {
          searchDropdown.classList.remove("open");
          searchDropdown.innerHTML = "";
          return;
        }

        const results = guides.filter((g) => matchesSearch(g, query)).slice(0, 6);

        if (results.length === 0) {
          searchDropdown.innerHTML = `<p class="search-no-results">No guides found for "<strong>${query}</strong>"</p>`;
        } else {
          searchDropdown.innerHTML = results
            .map(
              (g) => `
      <a class="search-result-item" href="#guide-${g.id}" data-id="${g.id}">
        <span class="search-result-title">${g.title}</span>
        <span class="search-result-desc">${g.description}</span>
        <div class="search-result-chips">
          ${g.tags.map((t) => `<span class="search-result-chip">${t}</span>`).join("")}
        </div>
      </a>
    `,
            )
            .join("");
        }

        searchDropdown.classList.add("open");
      }

      searchInput.addEventListener("input", (e) => {
        searchQuery = e.target.value.trim();
        if (searchQuery) activeCategory = "all";
        renderCategories();
        renderGuides();
        renderDropdown(searchQuery);
      });

      // Close dropdown when clicking outside
      document.addEventListener("click", (e) => {
        if (!document.querySelector(".search-wrap").contains(e.target)) {
          searchDropdown.classList.remove("open");
        }
      });

      // Close dropdown on result click, and scroll to card
      searchDropdown.addEventListener("click", (e) => {
        const item = e.target.closest(".search-result-item");
        if (!item) return;
        searchDropdown.classList.remove("open");
        const id = item.dataset.id;
        const card = document.querySelector(`[aria-label="${guides.find((g) => g.id == id)?.title}"]`);
        if (card) card.scrollIntoView({ behavior: "smooth", block: "center" });
      });

      // ── INIT ──────────────────────────────────────────────────────────────────────
      renderCategories();
      renderGuides();
    </script>
  </body>
